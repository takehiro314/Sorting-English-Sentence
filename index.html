<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#d9e0ea;--primary:#2563eb;--primary-dark:#1d4ed8;--soft:#e8f0ff;--green:#16a34a;--red:#dc2626;--amber:#f59e0b;--shadow:0 12px 30px rgba(25,40,80,.08);--radius:20px;--slot-size:48px;--chip-height:40px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 38%,#f7f7fb 100%);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding:14px}button,input{font:inherit}.app{width:min(100%,860px);margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 16px}.brand{display:flex;align-items:center;gap:10px}.logo{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#38bdf8);color:white;box-shadow:var(--shadow);font-weight:800}.brand h1{font-size:1.16rem;margin:0;line-height:1.2}.brand p{margin:2px 0 0;font-size:.8rem;color:var(--muted)}.pill{border:1px solid var(--line);background:rgba(255,255,255,.72);padding:8px 12px;border-radius:999px;color:var(--muted);font-size:.84rem;white-space:nowrap}.grid{display:grid;grid-template-columns:1fr;gap:14px}.card,.panel{background:rgba(255,255,255,.94);border:1px solid rgba(217,224,234,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;overflow:hidden}.card h2{font-size:1.02rem;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}.card h3{margin:16px 0 8px;font-size:.96rem}.sub{color:var(--muted);font-size:.9rem;line-height:1.7;margin:8px 0}.btn{border:0;border-radius:14px;padding:12px 14px;cursor:pointer;color:white;background:var(--primary);font-weight:700;box-shadow:0 10px 18px rgba(37,99,235,.2);min-height:46px}.btn:hover{background:var(--primary-dark)}.btn.secondary{color:var(--ink);background:#eef2f7;box-shadow:none;border:1px solid var(--line)}.btn.ghost{color:var(--primary);background:white;border:1px solid #bfd0ff;box-shadow:none}.btn.danger{background:var(--red)}.btn.small{min-height:36px;padding:8px 10px;border-radius:12px;font-size:.86rem}.btn:disabled{opacity:.45;cursor:not-allowed}.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.filebox{border:1.5px dashed #a8b9d8;background:#fbfdff;border-radius:18px;padding:14px;display:grid;gap:10px}.filebox input{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px}.sample{margin-top:10px;background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px;color:#374151;overflow-x:auto;font-size:.82rem;white-space:nowrap}.status{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.status span{background:#eef2f7;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:6px 10px;font-size:.82rem}.screen{display:none}.screen.active{display:block}.question-screen{min-height:calc(100vh - 28px);display:none}.question-screen.active{display:flex;flex-direction:column;gap:14px}.head{position:sticky;top:8px;z-index:20;background:rgba(245,247,251,.9);backdrop-filter:blur(12px);border:1px solid rgba(217,224,234,.9);border-radius:18px;padding:10px;box-shadow:var(--shadow)}.progress-line{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.88rem;margin-bottom:8px}.meter,.mini{width:100%;height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden}.meter div,.mini div{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#38bdf8);border-radius:inherit}.mini{height:8px;margin-top:8px}.mini.green div{background:linear-gradient(90deg,#16a34a,#86efac)}.label{color:var(--muted);font-size:.82rem;font-weight:700;letter-spacing:.03em;margin-bottom:8px}.translation{font-size:1.15rem;line-height:1.65;font-weight:800}.answer,.bank{display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px;min-height:66px;border:1px solid var(--line);border-radius:18px;background:#fbfdff;padding:10px}.slot{width:var(--slot-size);min-width:var(--slot-size);height:var(--chip-height);border:1.5px solid #cbd5e1;border-radius:12px;background:white;display:inline-flex;align-items:center;justify-content:center;padding:0;user-select:none;transition:width .15s ease,background .15s ease,border .15s ease}.slot.empty:after{content:"";width:16px;height:2px;border-radius:99px;background:#cbd5e1}.slot.filled{width:auto;min-width:0;max-width:100%;border-color:#9db7ee;background:#f8fbff}.slot.target{outline:3px solid rgba(37,99,235,.2);border-color:var(--primary)}.chip{height:var(--chip-height);min-height:var(--chip-height);display:inline-flex;align-items:center;justify-content:center;padding:0 12px;border-radius:12px;border:1px solid #bfd0ff;background:var(--soft);color:#1e3a8a;font-weight:800;line-height:1;cursor:pointer;touch-action:manipulation;user-select:none;white-space:nowrap;box-shadow:0 6px 12px rgba(37,99,235,.08);margin:0}.slot .chip{height:calc(var(--chip-height) - 3px);min-height:calc(var(--chip-height) - 3px);max-width:min(78vw,680px);overflow:hidden;text-overflow:ellipsis;box-shadow:none;border:0;border-radius:10px}.bank .chip{background:white}.chip.dragging{opacity:.45}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wide{grid-column:1/-1}.judge{min-height:26px;font-weight:800;text-align:center;margin-top:-4px}.judge.ok{color:var(--green)}.judge.ng{color:var(--red)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.summary.two{grid-template-columns:repeat(2,1fr)}.tile{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px 8px;text-align:center}.tile strong{display:block;font-size:1.2rem;margin-bottom:3px}.tile span{font-size:.78rem;color:var(--muted);line-height:1.35}.wrong-list{display:grid;gap:10px;margin-top:10px}.wrong{border:1px solid var(--line);border-left:5px solid var(--amber);border-radius:16px;background:#fffaf0;padding:12px}.wrong p{margin:6px 0;line-height:1.55}.wrong .meta{color:var(--muted);font-size:.8rem}.empty{color:var(--muted);text-align:center;padding:18px 8px;background:#f8fafc;border:1px solid var(--line);border-radius:16px}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}.modal-bg.active{display:flex}.modal{width:min(100%,460px);max-height:min(92vh,760px);overflow-y:auto;background:white;border-radius:22px;box-shadow:0 25px 80px rgba(15,23,42,.28);padding:18px}.modal h2{margin:0 0 10px;font-size:1.1rem}.modes{display:grid;gap:10px;margin:12px 0}.mode{display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:start;border:1px solid var(--line);border-radius:16px;padding:12px;background:#f8fafc;cursor:pointer}.mode:has(input:checked){border-color:#8eb2ff;background:#eef5ff;box-shadow:0 8px 18px rgba(37,99,235,.08)}.mode input{margin-top:2px}.mode-title{display:block;font-weight:800;margin-bottom:3px}.mode-desc{display:block;color:var(--muted);font-size:.84rem;line-height:1.5}.number{display:grid;gap:10px;margin:12px 0}.number input{border:1px solid var(--line);border-radius:14px;padding:12px;width:100%;font-size:1rem}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(min-width:720px){body{padding:24px}.grid{grid-template-columns:minmax(0,1fr) minmax(340px,.9fr);align-items:start}.actions{grid-template-columns:1fr 1fr}.question-screen.active{min-height:auto}.qcontent{display:grid;grid-template-columns:minmax(0,1fr);gap:14px}.translation{font-size:1.25rem}.controls{grid-template-columns:repeat(4,1fr)}.wide{grid-column:auto}}@media(max-width:380px){:root{--slot-size:44px}body{padding:10px}.card,.panel{padding:14px}.summary,.summary.two{grid-template-columns:1fr}}
</style>

<body>
<div class="app">
  <div id="home" class="screen active">
    <header class="topbar"><div class="brand"><div class="logo">⇄</div><div><h1>英文並び替え</h1><p>ver1.0.5 / CSVから並び替え演習</p></div></div><div class="pill" id="loadedPill">0問</div></header>
    <div class="grid">
      <section class="card"><h2>ホーム</h2><div class="filebox"><strong>CSVファイルを読み込む</strong><p class="sub">英文を <b>/</b> で区切った列と、和訳の列を読み取ります。ヘッダーがあっても使えます。</p><input id="csv" type="file" accept=".csv,text/csv" /><div class="sample">例：I/have/a/pen/.,私はペンを持っています。</div><div class="status"><span id="qStatus">読み込み済み：0問</span><span id="wStatus">保存済みミス：0件</span></div></div><div class="actions"><button class="btn" id="start">並び替え問題を開始</button><button class="btn secondary" id="clearQ">読み込みデータを削除</button></div><p class="sub">開始時に「無作為」「未出題のみ」「間違えた問題のみ」を選び、問題数を入力できます。</p></section>
      <section class="card"><h2>リザルト <button class="btn small ghost" id="refresh">更新</button></h2><h3>CSV全体の進捗</h3><div id="overall"></div><h3>前回の結果</h3><div id="latest"></div><h3>保存された間違い</h3><div class="actions"><button class="btn small secondary" id="clearW">間違い履歴を削除</button><button class="btn small secondary" id="resetStats">進捗をリセット</button></div><div id="wrongHistory" class="wrong-list"></div></section>
    </div>
  </div>
  <div id="question" class="question-screen"><div class="head"><div class="progress-line"><span id="progressText">1 / 1</span><span id="scoreText">正解 0</span></div><div class="meter"><div id="bar"></div></div></div><main class="qcontent"><section class="panel"><div class="label">和訳</div><div class="translation" id="ja"></div></section><section class="panel"><div class="label">ここに単語を並べる</div><div id="answer" class="answer"></div></section><section class="panel"><div class="label">単語カード</div><div id="bank" class="bank"></div></section><div id="judge" class="judge"></div><div class="controls"><button class="btn secondary" id="undo">1つ戻す</button><button class="btn secondary" id="reset">リセット</button><button class="btn wide" id="check">答え合わせ</button><button class="btn danger wide" id="quit">中断</button></div></main></div>
</div>
<div id="modalBg" class="modal-bg"><div class="modal"><h2>出題設定</h2><p class="sub" id="modalHelp">出題方式と問題数を選んでください。</p><div class="modes"><label class="mode"><input type="radio" name="mode" value="random" checked><span><span class="mode-title">無作為に選択</span><span class="mode-desc">CSV内の問題からランダムに出題します。</span></span></label><label class="mode"><input type="radio" name="mode" value="unseen"><span><span class="mode-title">まだ出題していない問題のみ</span><span class="mode-desc">答え合わせまで完了していない問題だけを出題します。</span></span></label><label class="mode"><input type="radio" name="mode" value="wrong"><span><span class="mode-title">出題して間違えた問題のみ</span><span class="mode-desc">過去に1回以上間違えた問題だけを復習します。</span></span></label></div><div class="number"><label><strong>問題数</strong><input id="count" type="number" min="1" step="1" inputmode="numeric"></label></div><div class="modal-actions"><button class="btn secondary" id="cancel">キャンセル</button><button class="btn" id="go">開始</button></div></div></div>
<script>
const K={questions:'ses.questions.v104',questionsOld:'sortingEnglish.questions.v2',questionsOld2:'sortingEnglish.questions.v1',wrongs:'ses.wrongs.v104',wrongsOld:'sortingEnglish.wrongs.v2',wrongsOld2:'sortingEnglish.wrongs.v1',latest:'ses.latest.v104',latestOld:'sortingEnglish.latestResult.v2',latestOld2:'sortingEnglish.latestResult.v1',stats:'ses.stats.v104'};
const S={questions:[],stats:{},session:[],idx:0,score:0,answered:0,wrongs:[],tokens:[],chips:[],drag:null,mode:'random'};
const $=id=>document.getElementById(id);const home=$('home'),question=$('question'),csv=$('csv'),loadedPill=$('loadedPill'),qStatus=$('qStatus'),wStatus=$('wStatus'),overall=$('overall'),latest=$('latest'),wrongHistory=$('wrongHistory'),start=$('start'),clearQ=$('clearQ'),clearW=$('clearW'),resetStats=$('resetStats'),refresh=$('refresh'),modalBg=$('modalBg'),modalHelp=$('modalHelp'),count=$('count'),cancel=$('cancel'),go=$('go'),progressText=$('progressText'),scoreText=$('scoreText'),bar=$('bar'),ja=$('ja'),answer=$('answer'),bank=$('bank'),judge=$('judge'),undo=$('undo'),reset=$('reset'),check=$('check'),quit=$('quit');
function parseJSON(v,f){try{return v?JSON.parse(v):f}catch{return f}}function esc(t){return String(t).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function hashId(j,t){const b=j+'__'+t.join(' ');let h=0;for(let i=0;i<b.length;i++){h=((h<<5)-h)+b.charCodeAt(i);h|=0}return 'q_'+Math.abs(h)+'_'+t.length}function norm(q){const t=Array.isArray(q.tokens)?q.tokens.map(x=>String(x).trim()).filter(Boolean):String(q.englishSlash||'').split('/').map(x=>x.trim()).filter(Boolean);const j=String(q.japanese||'').trim();return{id:q.id&&String(q.id).startsWith('q_')?q.id:hashId(j,t),japanese:j,englishSlash:q.englishSlash||t.join('/'),tokens:t,correct:t.join(' ')}}
function getWrongs(){return parseJSON(localStorage.getItem(K.wrongs),null)||parseJSON(localStorage.getItem(K.wrongsOld),null)||parseJSON(localStorage.getItem(K.wrongsOld2),[])}function saveWrongs(w){localStorage.setItem(K.wrongs,JSON.stringify(w))}function getLatest(){return parseJSON(localStorage.getItem(K.latest),null)||parseJSON(localStorage.getItem(K.latestOld),null)||parseJSON(localStorage.getItem(K.latestOld2),null)}function saveLatest(x){localStorage.setItem(K.latest,JSON.stringify(x))}function saveQ(){localStorage.setItem(K.questions,JSON.stringify(S.questions))}function saveStats(){localStorage.setItem(K.stats,JSON.stringify(S.stats))}
function makeId(j,t){return hashId(j,t)}function parseCSV(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'){if(q&&n==='"'){cell+='"';i++}else q=!q}else if(c===','&&!q){row.push(cell.trim());cell=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cell.trim());if(row.some(v=>v!==''))rows.push(row);row=[];cell=''}else cell+=c}row.push(cell.trim());if(row.some(v=>v!==''))rows.push(row);return rows}
function rowToQ(row,i){const c=row.map(v=>v.replace(/^\uFEFF/,'').trim());const si=c.findIndex(x=>x.includes('/'));let en='',jp='';if(si>=0){en=c[si];jp=c.find((x,k)=>k!==si&&x&&!x.includes('/'))||''}else if(c.length>=2){en=c[0];jp=c[1]}if(!en||!jp)return null;const low=en.toLowerCase();if(i===0&&(low.includes('english')||en.includes('英文')||en.includes('英語')||jp.includes('和訳')||jp.includes('日本語')))return null;const tokens=en.split('/').map(x=>x.trim()).filter(Boolean);if(tokens.length<2)return null;return norm({japanese:jp,englishSlash:en,tokens})}
function prune(){const ids=new Set(S.questions.map(q=>q.id));for(const id of Object.keys(S.stats)){if(!ids.has(id))delete S.stats[id]}}function load(){S.questions=(parseJSON(localStorage.getItem(K.questions),null)||parseJSON(localStorage.getItem(K.questionsOld),null)||parseJSON(localStorage.getItem(K.questionsOld2),[])).map(norm).filter(q=>q.japanese&&q.tokens.length>=2);S.stats=parseJSON(localStorage.getItem(K.stats),{});prune();saveQ();saveStats();renderHome()}
function st(id){if(!S.stats[id])S.stats[id]={attempts:0,correct:0,wrong:0,lastAnsweredAt:null};return S.stats[id]}function overallStats(){const total=S.questions.length;let attempted=0,mastered=0,attempts=0,correct=0,wrongQ=0;for(const q of S.questions){const s=S.stats[q.id];if(s&&s.attempts>0){attempted++;attempts+=s.attempts;correct+=s.correct;if(s.correct>0)mastered++;if(s.wrong>0)wrongQ++}}return{total,attempted,unseen:Math.max(0,total-attempted),mastered,attempts,correct,wrongQ,exercise:total?Math.round(attempted/total*100):0,success:attempts?Math.round(correct/attempts*100):0}}
function renderHome(){const w=getWrongs(),o=overallStats();loadedPill.textContent=S.questions.length+'問';qStatus.textContent='読み込み済み：'+S.questions.length+'問';wStatus.textContent='保存済みミス：'+w.length+'件';start.disabled=S.questions.length===0;renderOverall(o);renderLatest();renderWrongs()}
function renderOverall(o){if(o.total===0){overall.innerHTML='<div class="empty">CSVを読み込むと、全体の進捗が表示されます。</div>';return}overall.innerHTML=`<div class="summary two"><div class="tile"><strong>${o.exercise}%</strong><span>演習済み<br>${o.attempted} / ${o.total}問</span><div class="mini"><div style="width:${o.exercise}%"></div></div></div><div class="tile"><strong>${o.success}%</strong><span>成功率<br>${o.correct} / ${o.attempts}回</span><div class="mini green"><div style="width:${o.success}%"></div></div></div></div><div class="summary"><div class="tile"><strong>${o.unseen}</strong><span>未出題</span></div><div class="tile"><strong>${o.wrongQ}</strong><span>誤答あり</span></div><div class="tile"><strong>${o.mastered}</strong><span>正解経験あり</span></div></div>`}
function label(m){return m==='unseen'?'未出題のみ':m==='wrong'?'間違えた問題のみ':'無作為'}function renderLatest(){const l=getLatest();if(!l){latest.innerHTML='<div class="empty">まだ結果はありません。</div>';return}latest.innerHTML=`<div class="summary"><div class="tile"><strong>${l.answered??l.total}</strong><span>解答完了</span></div><div class="tile"><strong>${l.score}</strong><span>正解</span></div><div class="tile"><strong>${l.wrong}</strong><span>間違い</span></div></div><p class="sub">前回：${esc(l.date)} / ${esc(label(l.mode||'random'))}</p>`}
function renderWrongs(){const w=getWrongs().slice().reverse();if(w.length===0){wrongHistory.innerHTML='<div class="empty">間違えた問題はまだ保存されていません。</div>';return}wrongHistory.innerHTML=w.map(x=>`<article class="wrong"><p class="meta">${esc(x.date)}</p><p><b>和訳：</b>${esc(x.japanese)}</p><p><b>正解：</b>${esc(x.correct)}</p><p><b>あなたの回答：</b>${esc(x.answer||'未回答')}</p></article>`).join('')}
function avail(m){if(m==='unseen')return S.questions.filter(q=>!S.stats[q.id]||S.stats[q.id].attempts===0);if(m==='wrong')return S.questions.filter(q=>S.stats[q.id]&&S.stats[q.id].wrong>0);return [...S.questions]}function selectedMode(){return document.querySelector('input[name="mode"]:checked')?.value||'random'}function updateModal(){const m=selectedMode(),a=avail(m).length,v=Number(count.value);modalHelp.textContent=`${label(m)}：出題可能 ${a}問`;go.disabled=a===0;count.max=String(Math.max(1,a));if(a===0){count.value='';count.placeholder='出題できる問題がありません'}else{count.placeholder='';if(!v||v>a)count.value=String(Math.min(10,a))}}
function openModal(){if(S.questions.length===0){alert('先にCSVファイルを読み込んでください。');return}modalBg.classList.add('active');updateModal();setTimeout(()=>count.focus(),0)}function closeModal(){modalBg.classList.remove('active')}function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}function shuffleTokens(t){if(t.length<=2)return shuffle(t);let r=shuffle(t),n=0;while(r.every((x,i)=>x===t[i])&&n<12){r=shuffle(t);n++}return r}
function startSession(m,n){S.session=shuffle(avail(m)).slice(0,n);S.idx=0;S.score=0;S.answered=0;S.wrongs=[];S.mode=m;home.classList.remove('active');question.classList.add('active');renderQ()}
function cur(){return S.session[S.idx]}function renderQ(){const q=cur();if(!q){finish(false);return}S.tokens=q.tokens;S.chips=shuffleTokens(q.tokens).map((v,i)=>({id:S.idx+'-'+i+'-'+Math.random().toString(36).slice(2,6),value:v,placed:false}));progressText.textContent=`${S.idx+1} / ${S.session.length}`;scoreText.textContent='正解 '+S.score;bar.style.width=(S.idx/S.session.length*100)+'%';ja.textContent=q.japanese;judge.textContent='';judge.className='judge';check.disabled=false;renderSlots();renderBank()}
function renderSlots(){answer.innerHTML='';S.tokens.forEach((_,i)=>{const s=document.createElement('div');s.className='slot empty';s.dataset.index=String(i);s.addEventListener('click',()=>removeSlot(i));s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('target')});s.addEventListener('dragleave',()=>s.classList.remove('target'));s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('target');place(e.dataTransfer.getData('text/plain')||S.drag,Number(s.dataset.index))});answer.appendChild(s)})}
function renderBank(){bank.innerHTML='';const rem=S.chips.filter(x=>!x.placed);rem.forEach(x=>bank.appendChild(chipEl(x)));if(rem.length===0){const d=document.createElement('div');d.className='empty';d.textContent='すべて配置済みです。';bank.appendChild(d)}}function chipEl(item){const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=item.value;b.draggable=true;b.dataset.tokenId=item.id;b.addEventListener('click',()=>placeFirst(item.id));b.addEventListener('dragstart',e=>{S.drag=item.id;b.classList.add('dragging');e.dataTransfer.setData('text/plain',item.id);e.dataTransfer.effectAllowed='move'});b.addEventListener('dragend',()=>{S.drag=null;b.classList.remove('dragging');document.querySelectorAll('.slot.target').forEach(x=>x.classList.remove('target'))});return b}
function placeFirst(id){const s=[...answer.querySelectorAll('.slot')].find(x=>!x.dataset.tokenId);if(s)place(id,Number(s.dataset.index))}function place(id,i){const item=S.chips.find(x=>x.id===id),s=answer.querySelector(`.slot[data-index="${i}"]`);if(!item||!s||item.placed)return;if(s.dataset.tokenId)removeSlot(i);item.placed=true;s.dataset.tokenId=item.id;s.dataset.value=item.value;s.className='slot filled';s.innerHTML='';const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=item.value;b.addEventListener('click',e=>{e.stopPropagation();removeSlot(i)});s.appendChild(b);renderBank()}function removeSlot(i){const s=answer.querySelector(`.slot[data-index="${i}"]`);if(!s||!s.dataset.tokenId)return;const item=S.chips.find(x=>x.id===s.dataset.tokenId);if(item)item.placed=false;delete s.dataset.tokenId;delete s.dataset.value;s.className='slot empty';s.innerHTML='';renderBank()}function ans(){return [...answer.querySelectorAll('.slot')].map(s=>s.dataset.value||'')}
function updateStat(q,ok){const x=st(q.id);x.attempts++;x.lastAnsweredAt=new Date().toISOString();if(ok)x.correct++;else x.wrong++;saveStats()}function checkAns(){const q=cur(),a=ans();if(!a.every(Boolean)){judge.textContent='まだ空欄があります。';judge.className='judge ng';return}const ok=a.every((x,i)=>x===q.tokens[i]),user=a.join(' ');check.disabled=true;S.answered++;updateStat(q,ok);if(ok){S.score++;judge.textContent='正解！';judge.className='judge ok'}else{judge.textContent='不正解。正解：'+q.correct;judge.className='judge ng';S.wrongs.push({questionId:q.id,japanese:q.japanese,correct:q.correct,answer:user,date:fmt(new Date())})}scoreText.textContent='正解 '+S.score;bar.style.width=((S.idx+1)/S.session.length*100)+'%';setTimeout(()=>{S.idx++;if(S.idx>=S.session.length)finish(false);else renderQ()},ok?650:1500)}
function resetCurrent(){S.chips.forEach(x=>x.placed=false);renderSlots();renderBank();judge.textContent='';judge.className='judge';check.disabled=false}function undoLast(){const slots=[...answer.querySelectorAll('.slot')];const last=slots.reverse().find(s=>s.dataset.tokenId);if(last)removeSlot(Number(last.dataset.index))}function finish(isQuit){saveWrongs([...getWrongs(),...S.wrongs].slice(-300));saveLatest({planned:S.session.length,answered:S.answered,total:S.answered,score:S.score,wrong:S.wrongs.length,mode:S.mode,date:fmt(new Date())});question.classList.remove('active');home.classList.add('active');renderHome();alert(`${isQuit?'中断':'終了'}：${S.answered}問解答 / ${S.score}問正解\n間違い ${S.wrongs.length}件をリザルトに保存しました。`)}function fmt(d){return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
csv.addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;try{const qs=parseCSV(await f.text()).map(rowToQ).filter(Boolean);if(qs.length===0){alert('問題として読み取れる行がありませんでした。形式を確認してください。');return}S.questions=qs;prune();saveQ();saveStats();renderHome();alert(qs.length+'問を読み込みました。')}catch(err){console.error(err);alert('CSVの読み込みに失敗しました。')}finally{csv.value=''}});
start.addEventListener('click',openModal);clearQ.addEventListener('click',()=>{if(!confirm('読み込み済みの問題データを削除しますか？\n進捗もリセットされます。'))return;S.questions=[];S.stats={};localStorage.removeItem(K.questions);localStorage.removeItem(K.questionsOld);localStorage.removeItem(K.questionsOld2);localStorage.removeItem(K.stats);renderHome()});clearW.addEventListener('click',()=>{if(!confirm('保存された間違い履歴を削除しますか？'))return;saveWrongs([]);renderHome()});resetStats.addEventListener('click',()=>{if(!confirm('CSV全体の演習済み・成功率の進捗をリセットしますか？'))return;S.stats={};saveStats();renderHome()});refresh.addEventListener('click',renderHome);cancel.addEventListener('click',closeModal);document.querySelectorAll('input[name="mode"]').forEach(r=>r.addEventListener('change',updateModal));go.addEventListener('click',()=>{const m=selectedMode(),a=avail(m).length,n=Number(count.value);if(a===0){alert(label(m)+'で出題できる問題がありません。');return}if(!Number.isInteger(n)||n<1||n>a){alert(`1〜${a}の範囲で入力してください。`);return}closeModal();startSession(m,n)});modalBg.addEventListener('click',e=>{if(e.target===modalBg)closeModal()});count.addEventListener('keydown',e=>{if(e.key==='Enter')go.click()});check.addEventListener('click',checkAns);reset.addEventListener('click',resetCurrent);undo.addEventListener('click',undoLast);quit.addEventListener('click',()=>{if(confirm('現在の問題を中断してホームに戻りますか？\n答え合わせまで完了した問題だけがリザルトに反映されます。'))finish(true)});load();
</script>
